<svg width="1440" height="900" viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Noto Sans KR', sans-serif">
  <defs>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
    <filter id="softer" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.05"/>
    </filter>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d5df6"/><stop offset="1" stop-color="#8b7cff"/>
    </linearGradient>
    <linearGradient id="conclusion" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f3ff"/><stop offset="1" stop-color="#ede9fe"/>
    </linearGradient>
  </defs>

  <rect width="1440" height="900" fill="#ffffff"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="232" height="900" fill="#ffffff"/>
  <line x1="232" y1="0" x2="232" y2="900" stroke="#eef0f6"/>
  <rect x="20" y="24" width="40" height="40" rx="14" fill="url(#violet)"/>
  <text x="72" y="42" font-size="15" font-weight="800" fill="#111827">DREAMWISH</text>
  <text x="72" y="58" font-size="10" fill="#8a92a6">AI Decision OS</text>

  <rect x="14" y="96" width="204" height="44" rx="14" fill="#f2f0ff"/>
  <circle cx="38" cy="118" r="8" fill="none" stroke="#6d5df6" stroke-width="2"/>
  <text x="58" y="123" font-size="13.5" font-weight="700" fill="#6d5df6">AI Chat</text>
  <circle cx="38" cy="166" r="8" fill="none" stroke="#98a1b3" stroke-width="2"/>
  <text x="58" y="171" font-size="13.5" font-weight="600" fill="#5c6474">Memory</text>
  <circle cx="38" cy="214" r="8" fill="none" stroke="#98a1b3" stroke-width="2"/>
  <text x="58" y="219" font-size="13.5" font-weight="600" fill="#5c6474">Team</text>

  <!-- Chat column -->
  <text x="264" y="52" font-size="20" font-weight="800" fill="#111827">AI Chat</text>
  <text x="264" y="74" font-size="12.5" fill="#8a92a6">AI가 질문하고, 딥리서치와 시뮬레이션을 거쳐 최종 결론까지 제안합니다</text>

  <!-- flow steps -->
  <g font-size="11" font-weight="700">
    <rect x="264" y="90" width="86" height="26" rx="13" fill="#6d5df6"/><text x="279" y="107" fill="#ffffff">1 인터뷰</text>
    <rect x="358" y="90" width="96" height="26" rx="13" fill="#f2f0ff"/><text x="371" y="107" fill="#6d5df6">2 딥리서치</text>
    <rect x="462" y="90" width="106" height="26" rx="13" fill="#f6f7fb"/><text x="474" y="107" fill="#98a1b3">3 시뮬레이션</text>
    <rect x="576" y="90" width="96" height="26" rx="13" fill="#f6f7fb"/><text x="589" y="107" fill="#98a1b3">4 최종 결론</text>
  </g>

  <!-- AI question bubble -->
  <rect x="264" y="140" width="520" height="86" rx="18" fill="#ffffff" stroke="#eef0f6" filter="url(#softer)"/>
  <rect x="282" y="158" width="30" height="30" rx="10" fill="url(#violet)"/>
  <text x="291" y="178" font-size="12" font-weight="800" fill="#ffffff">AI</text>
  <text x="326" y="170" font-size="13" font-weight="700" fill="#111827">이번 결정으로 달성하려는 가장 중요한 목표는 무엇인가요?</text>
  <text x="326" y="190" font-size="11.5" fill="#8a92a6">예산·기한·제약이 있다면 함께 알려주세요. 답할수록 결론이 정확해집니다.</text>
  <rect x="326" y="200" width="66" height="18" rx="9" fill="#f2f0ff"/><text x="336" y="213" font-size="10" font-weight="700" fill="#6d5df6">질문 2/6</text>

  <!-- user answer bubble -->
  <rect x="452" y="244" width="332" height="56" rx="18" fill="#6d5df6"/>
  <text x="472" y="268" font-size="12.5" font-weight="600" fill="#ffffff">3분기 안에 마케팅 예산 5,000만원 이하로</text>
  <text x="472" y="286" font-size="12.5" font-weight="600" fill="#ffffff">신제품 A 국내 출시 여부를 정하고 싶어요</text>

  <!-- deep research config card -->
  <rect x="264" y="322" width="520" height="150" rx="18" fill="#ffffff" stroke="#eef0f6" filter="url(#softer)"/>
  <text x="286" y="350" font-size="13.5" font-weight="800" fill="#111827">딥리서치 설정</text>
  <rect x="700" y="336" width="66" height="22" rx="11" fill="#eefdf3"/><text x="712" y="351" font-size="10.5" font-weight="700" fill="#16a34a">준비됨</text>
  <g font-size="11.5" fill="#5c6474">
    <rect x="286" y="366" width="152" height="40" rx="12" fill="#f6f7fb"/><text x="298" y="383" font-weight="700" fill="#111827">조사 깊이</text><text x="298" y="399">심층 · 최대 20분</text>
    <rect x="450" y="366" width="152" height="40" rx="12" fill="#f6f7fb"/><text x="462" y="383" font-weight="700" fill="#111827">출처</text><text x="462" y="399">웹 + 내부 문서</text>
    <rect x="614" y="366" width="152" height="40" rx="12" fill="#f6f7fb"/><text x="626" y="383" font-weight="700" fill="#111827">시뮬레이션</text><text x="626" y="399">자동 실행</text>
  </g>
  <rect x="286" y="420" width="240" height="34" rx="12" fill="url(#violet)"/>
  <text x="330" y="442" font-size="12.5" font-weight="800" fill="#ffffff">딥리서치 + 시뮬레이션 실행</text>
  <rect x="538" y="420" width="120" height="34" rx="12" fill="#ffffff" stroke="#e5e8f0"/>
  <text x="560" y="442" font-size="12" font-weight="700" fill="#5c6474">건너뛰기</text>

  <!-- progress -->
  <rect x="264" y="494" width="520" height="64" rx="18" fill="#ffffff" stroke="#eef0f6" filter="url(#softer)"/>
  <text x="286" y="520" font-size="12" font-weight="700" fill="#111827">조사 진행 중 — 12개 출처 확인, 시뮬레이션 대기</text>
  <rect x="286" y="532" width="456" height="8" rx="4" fill="#f0f1f6"/>
  <rect x="286" y="532" width="296" height="8" rx="4" fill="url(#violet)"/>

  <!-- input bar -->
  <rect x="264" y="806" width="520" height="56" rx="18" fill="#ffffff" stroke="#e5e8f0" filter="url(#softer)"/>
  <text x="288" y="838" font-size="12.5" fill="#a2aabb">답변을 입력하세요…</text>
  <rect x="726" y="816" width="44" height="36" rx="12" fill="url(#violet)"/>
  <path d="M742 838 l14 -6 l-14 -6 l3 6 z" fill="#ffffff"/>

  <!-- Report panel -->
  <rect x="816" y="36" width="592" height="826" rx="22" fill="#fbfbfe" stroke="#eef0f6" filter="url(#soft)"/>
  <text x="844" y="76" font-size="15" font-weight="800" fill="#111827">Decision Report</text>
  <rect x="1250" y="56" width="130" height="28" rx="14" fill="#f2f0ff"/>
  <text x="1266" y="75" font-size="11" font-weight="700" fill="#6d5df6">실시간 업데이트</text>

  <!-- core conclusion -->
  <rect x="844" y="96" width="536" height="112" rx="18" fill="url(#conclusion)" stroke="#e4defc"/>
  <text x="866" y="124" font-size="11" font-weight="800" fill="#6d5df6">핵심 결론</text>
  <text x="866" y="150" font-size="16" font-weight="800" fill="#111827">특정 고객군 대상 제한 출시를 권고합니다.</text>
  <text x="866" y="172" font-size="12.5" fill="#4b5265">12개월 손익분기 확률 68%, 조직 실행 가능성 보통 — 3개월 검증 후 확대가 최적입니다.</text>
  <rect x="866" y="184" width="84" height="18" rx="9" fill="#ffffff"/><text x="878" y="197" font-size="10" font-weight="700" fill="#6d5df6">신뢰수준 보통</text>

  <!-- evidence -->
  <text x="844" y="242" font-size="12" font-weight="800" fill="#111827">근거 · 딥리서치</text>
  <rect x="844" y="252" width="536" height="66" rx="14" fill="#ffffff" stroke="#eef0f6"/>
  <text x="864" y="274" font-size="11.5" fill="#4b5265">· 국내 시장 규모 전년 대비 +14%, 경쟁 3사 상반기 출시 완료 (출처 8건)</text>
  <text x="864" y="292" font-size="11.5" fill="#4b5265">· 유사 제품 제한 출시 사례 성공률 61% — 전면 출시 대비 리스크 42% 감소</text>
  <text x="864" y="310" font-size="11.5" fill="#4b5265">· 내부 문서: 물류 캐파 4분기까지 제한적</text>

  <!-- counterpoints -->
  <text x="844" y="352" font-size="12" font-weight="800" fill="#111827">반대 의견과 예상 결과</text>
  <rect x="844" y="362" width="536" height="58" rx="14" fill="#fff9ec" stroke="#f5e5bd"/>
  <text x="864" y="384" font-size="11.5" fill="#8a6d1f">· "전면 출시로 선점해야 한다" → 실패 시 손실 2.1배, 성공 확률 41%로 열세</text>
  <text x="864" y="402" font-size="11.5" fill="#8a6d1f">· "출시 보류" → 경쟁사 점유율 고착 위험, 6개월 후 진입 비용 +30%</text>

  <!-- employee signal -->
  <text x="844" y="456" font-size="12" font-weight="800" fill="#111827">조직 의견 (Team 익명 설문)</text>
  <rect x="844" y="466" width="536" height="96" rx="14" fill="#ffffff" stroke="#eef0f6"/>
  <text x="864" y="490" font-size="11" font-weight="700" fill="#6d5df6">Employee Signal 63점 · 응답률 78% · 신뢰 높음</text>
  <g font-size="10.5" fill="#5c6474">
    <text x="864" y="512">지지 72</text><rect x="920" y="504" width="200" height="8" rx="4" fill="#f0f1f6"/><rect x="920" y="504" width="144" height="8" rx="4" fill="#6d5df6"/>
    <text x="864" y="532">실행 가능성 58</text><rect x="960" y="524" width="160" height="8" rx="4" fill="#f0f1f6"/><rect x="960" y="524" width="93" height="8" rx="4" fill="#8b7cff"/>
    <text x="864" y="552">주요 우려: 인력·역량 부족, 일정 지연 · 소수 의견 1건 보존</text>
  </g>

  <!-- simulation -->
  <text x="844" y="598" font-size="12" font-weight="800" fill="#111827">시뮬레이션</text>
  <rect x="844" y="608" width="536" height="88" rx="14" fill="#ffffff" stroke="#eef0f6"/>
  <g font-size="11.5">
    <text x="864" y="632" font-weight="800" fill="#6d5df6">1위 제한 출시 74.2</text>
    <rect x="1000" y="622" width="240" height="8" rx="4" fill="#f0f1f6"/><rect x="1000" y="622" width="178" height="8" rx="4" fill="url(#violet)"/>
    <text x="864" y="656" font-weight="700" fill="#5c6474">2위 전면 출시 61.8</text>
    <rect x="1000" y="646" width="240" height="8" rx="4" fill="#f0f1f6"/><rect x="1000" y="646" width="148" height="8" rx="4" fill="#c7bfff"/>
    <text x="864" y="680" font-weight="700" fill="#5c6474">3위 출시 보류 44.0</text>
    <rect x="1000" y="670" width="240" height="8" rx="4" fill="#f0f1f6"/><rect x="1000" y="670" width="106" height="8" rx="4" fill="#e4e0fb"/>
  </g>

  <!-- approval -->
  <rect x="844" y="726" width="536" height="72" rx="16" fill="#ffffff" stroke="#eef0f6"/>
  <text x="866" y="752" font-size="11.5" font-weight="700" fill="#111827">최종 결정은 항상 사람이 승인합니다</text>
  <text x="866" y="770" font-size="10.5" fill="#8a92a6">Employee Signal 가중치 15% 반영 · 근거와 반대 의견을 검토하세요</text>
  <rect x="1204" y="740" width="152" height="40" rx="13" fill="url(#violet)"/>
  <text x="1240" y="765" font-size="12.5" font-weight="800" fill="#ffffff">승인하기</text>
</svg>
