# scheduler-cron service (Config as Code path: /railway.cron.toml)
# Runs one bounded maintenance pass every 5 minutes and exits:
#  - recovers stalled deep-research jobs to a resumable paused state
#  - removes expired terminal deep-research jobs (30-day retention)
# The web service also performs the same recovery lazily on every research
# API call, so this cron is defense-in-depth, not the only recovery path.

[build]
builder = "RAILPACK"
buildCommand = "npm ci"

[deploy]
startCommand = "npm run cron:schedulers"
cronSchedule = "*/5 * * * *"
restartPolicyType = "NEVER"
